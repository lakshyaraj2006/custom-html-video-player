<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Custom Video Player</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/src/index.css">

</head>

<body class="bg-neutral-900 flex items-center justify-center min-h-screen">

    <div id="video-container" class="group relative w-2/4 aspect-video bg-black transition-all duration-300">

        <video id="video" class="w-full h-full transition duration-200"></video>

        <div id="controls"
            class="absolute bottom-0 w-full text-white bg-linear-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">

            <!-- Seekbar -->
            <div class="flex items-center gap-2 px-3 pt-2 text-xs">

                <span id="currentTime" class="cursor-pointer">0:00</span>

                <input type="range" id="seekbar" min="0" max="100" value="0"
                    class="flex-1 h-1 accent-red-500 cursor-pointer">

                <span id="totalTime">0:00</span>

            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between p-3">

                <div class="flex items-center gap-4">

                    <!-- Play / Pause -->
                    <div class="tooltip">
                        <i class="fa-solid fa-play" id="playPauseBtn"></i>
                        <span class="tooltip-text" id="playTooltip">Play</span>
                    </div>

                    <!-- Volume -->
                    <div class="flex items-center gap-2 group/volume tooltip">

                        <i class="fa-solid fa-volume-high" id="volumeIcon"></i>

                        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1"
                            class="w-0 opacity-0 group-hover/volume:w-20 group-hover/volume:opacity-100 transition-all duration-300 h-1 accent-white cursor-pointer">

                        <span class="tooltip-text" id="volumeTooltip">Mute</span>

                    </div>

                    <!-- Speed -->
                    <div class="tooltip">

                        <select id="speedControl" class="bg-black/60 text-xs px-1 py-0.5 rounded cursor-pointer">

                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>

                        </select>

                        <span class="tooltip-text">Playback Speed</span>

                    </div>

                </div>

                <div class="flex items-center gap-4">

                    <!-- Loop -->
                    <div class="tooltip">
                        <i class="fa-solid fa-repeat" id="loopBtn"></i>
                        <span class="tooltip-text" id="loopTooltip">Loop Off</span>
                    </div>

                    <!-- Fullscreen -->
                    <div class="tooltip">
                        <i class="fa-solid fa-expand" id="fullScreenBtn"></i>
                        <span class="tooltip-text" id="fullscreenTooltip">Fullscreen</span>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="/src/script.js"></script>

</body>

</html>
